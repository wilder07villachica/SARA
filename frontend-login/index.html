<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CIBERTEC - Inicio de sesión</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-body">
  <div class="login-shell">
    <main class="login-card">
      <div class="brand-block">
        <img src="logo-cibertec.jpg" alt="Cibertec" class="brand-logo" />
      </div>

      <section class="login-content">
        <h1>Iniciar sesión</h1>
        <p class="login-subtitle">Sistema de apoyo al diagnóstico</p>

        <form id="loginForm" class="login-form">
          <label class="field">
            <span>Usuario</span>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              placeholder="Ingrese su usuario"
              required
            />
          </label>

          <label class="field">
            <span>Contraseña</span>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="Ingrese su contraseña"
              required
            />
          </label>

          <button id="btnLogin" type="submit" class="btn-primary">
            Entrar
          </button>
        </form>
      </section>
    </main>
  </div>

  <!-- Modal flotante -->
  <div id="feedbackModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-icon" id="modalIcon">✓</div>
      <h2 id="modalTitle">Inicio correcto</h2>
      <p id="modalMessage">Redirigiendo al sistema principal...</p>
      <button id="modalBtn" class="btn-primary" type="button">Entendido</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
