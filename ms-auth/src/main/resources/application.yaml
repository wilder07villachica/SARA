server:
  port: ${PORT:8080}

spring:
  application:
    name: ms-auth

  datasource:
    url: jdbc:h2:file:/tmp/authdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2

jwt:
  secret: ${JWT_SECRET:12345678901234567890123456789012}
  expiration-minutes: ${JWT_EXP_MIN:60}